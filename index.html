<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario Labs y Clínicas</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState } = React;


 const {
  Home, ScanLine, ClipboardList, LayoutGrid, Search, ChevronLeft,
  AlertTriangle, ArrowDownCircle, ArrowUpCircle, CheckCircle2,
  MapPin, FlaskConical, Syringe, Package, Droplet, X, QrCode, User,
  PackagePlus, ChevronDown, RotateCw, MoreHorizontal
 } = lucide;
// Load and execute the JSX component
 fetch('https://raw.githubusercontent.com/llucop/Inventario-Labs-y-Clinicas/main/inventario_mockup.jsx')
  .then(response => response.text())
  .then(jsxCode => {
    // Remove import statements and replace with global variables
    const transformedCode = jsxCode
      .replace(/import React, \{ useState \} from ["']react["'];?/g, '')
      .replace(/import \{[^}]+\} from ["']lucide-react["'];?/g, '')
      .replace(/export default function/g, 'function');
    
    // Execute the transformed code
    eval(Babel.transform(transformedCode, { presets: ['react'] }).code);
    
    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(InventarioMockup));
  });
 </script>
</body>
</html>
